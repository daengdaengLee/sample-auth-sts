name: CI

# push 마다 두 모듈(server/client)의 빌드/vet/gofmt/테스트(+race)와 클라이언트 크로스모듈
# e2e(-tags e2e)를 자동 실행한다. e2e 안에 presigned 만료 상한의 클라이언트/서버 일치 가드
# (TestPresignExpiryBoundsAgree)가 있어, 두 상수가 어긋나면 여기서 잡힌다.
#
# 트리거는 push 만 둔다(모든 브랜치). pull_request 를 함께 두면 같은 저장소 브랜치 PR 이 두
# 이벤트로 중복 실행되므로 뺐다. 대신 기능 브랜치 push 도 매번 커버된다. 포크에서 온 PR 은 base
# 저장소 push 이벤트가 없어 CI 가 돌지 않는다(개인 샘플 저장소라 감수).
on:
  push:

# 같은 ref 에 연속 push 하면 이전(무의미한) 실행을 취소해 러너를 아낀다. 단 기본 브랜치(main)는
# 각 커밋의 통과 기록을 남기도록 취소하지 않고 완주시킨다(기능 브랜치만 취소).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samplego/server
    steps:
      - uses: actions/checkout@v4
      # go.mod 의 go 버전을 그대로 설치한다(정확 버전, setup 단계에서 명확히 성공/실패).
      # 캐시는 모듈이 중첩돼 루트 go.sum 이 없으므로 이 모듈 go.sum 을 명시해야 실제로 걸린다.
      - uses: actions/setup-go@v5
        with:
          go-version-file: samplego/server/go.mod
          cache-dependency-path: samplego/server/go.sum
      - run: go build ./...
      - run: go vet ./...
      # gofmt 게이트: 미정렬 파일이 있으면 실패한다.
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt 필요:"; echo "$out"; exit 1; fi
      - run: go test -race ./...

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samplego/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: samplego/client/go.mod
          cache-dependency-path: samplego/client/go.sum
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt 필요:"; echo "$out"; exit 1; fi
      - run: go test -race ./...
      # 크로스모듈 e2e(실 라우터 + 목 STS). 상한 일치 가드를 포함한다.
      - run: go test -tags e2e -race ./internal/e2e/...
